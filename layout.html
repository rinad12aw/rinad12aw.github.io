{% include "layouts/header.html" %}

<div id="flash-root">
{% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="flash-container">
            {% for msg in messages %}
                <div class="flash-message">{{ msg }}</div>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}
</div>
<br>
