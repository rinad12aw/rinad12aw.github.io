{% extends "layouts/layout.html" %}

{% block content %}

<div class="login-wrapper">
    <div class="login-card">

        <div class="login-left">
            <img src="/assets/images/logo.png" class="login-logo-img">
        </div>

        <div class="login-right">
            <form method="POST" class="login-form">

                <label class="login-label">New Password</label>
                <input class="login-input" type="password" name="password" required>

                <label class="login-label">Confirm Password</label>
                <input class="login-input" type="password" name="confirm" required>

                <button class="login-btn">Reset Password</button>

                <div class="login-back">
                    <a href="/login">Back to Login</a>
                </div>

            </form>
        </div>

    </div>
</div>

{% endblock %}
